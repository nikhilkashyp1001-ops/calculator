<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Size Calculator</title>
  <style>
    :root {
      --bg: #f5f5f4;
      --card: #ffffff;
      --surface: #f1efe8;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #9a9a9a;
      --border: rgba(0, 0, 0, 0.1);
      --border-focus: #185fa5;
      --accent: #378add;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --card: #242424;
        --surface: #2e2e2e;
        --text-primary: #f5f5f4;
        --text-secondary: #a8a8a8;
        --text-tertiary: #6b6b6b;
        --border: rgba(255, 255, 255, 0.12);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .title {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 20px;
      color: var(--text-primary);
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-tertiary);
      pointer-events: none;
    }

    input[type="number"] {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"].with-prefix {
      padding-left: 26px;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.15);
    }

    .result {
      background: var(--surface);
      border-radius: 8px;
      padding: 16px;
      margin-top: 4px;
    }

    .result-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .result-value {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .result-number {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .result-unit {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="title">Position size calculator</h1>

      <div class="field">
        <label class="label" for="sl">Stop loss (points)</label>
        <div class="input-wrap">
          <input id="sl" type="number" inputmode="decimal" step="any" min="0" placeholder="e.g. 10" />
        </div>
      </div>

      <div class="field">
        <label class="label" for="risk">Risk amount</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input id="risk" type="number" inputmode="decimal" step="any" min="0" placeholder="e.g. 10" class="with-prefix" />
        </div>
      </div>

      <div class="result">
        <div class="result-label">Position size</div>
        <div class="result-value">
          <span id="output" class="result-number">—</span>
          <span id="unit" class="result-unit"></span>
        </div>
      </div>
    </div>
    <div class="footer">Position size = (Risk ÷ SL points) × 100</div>
  </div>

  <script>
    (function () {
      const slInput = document.getElementById('sl');
      const riskInput = document.getElementById('risk');
      const output = document.getElementById('output');
      const unit = document.getElementById('unit');

      function formatNumber(n) {
        const rounded = Math.round(n * 100) / 100;
        return rounded.toLocaleString('en-US', { maximumFractionDigits: 2 });
      }

      function calculate() {
        const sl = parseFloat(slInput.value);
        const risk = parseFloat(riskInput.value);

        if (!isFinite(sl) || !isFinite(risk) || sl <= 0 || risk < 0) {
          output.textContent = '—';
          unit.textContent = '';
          return;
        }

        const size = (risk / sl) * 100;
        output.textContent = formatNumber(size);
        unit.textContent = 'units';
      }

      slInput.addEventListener('input', calculate);
      riskInput.addEventListener('input', calculate);
    })();
  </script>
</body>
</html>
